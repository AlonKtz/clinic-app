<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .scale{display:flex;align-items:flex-end;gap:10px;padding-top:8px;}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--qf-grad-brand);border-radius:6px 6px 0 0;width:34px;}
  .px{font-family:var(--qf-font-mono);font-size:10px;color:var(--qf-fg-3);}
  .nm{font-size:11px;color:var(--qf-fg-2);font-weight:600;}
  .head{font-weight:700;font-size:13px;color:var(--qf-fg-2);margin-bottom:8px;}
</style></head>
<body>
  <div class="head">Spacing scale · 4-pt base · used as <code>--qf-s-*</code></div>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="nm">s-1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="nm">s-2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="nm">s-3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="nm">s-4</div></div>
    <div class="step"><div class="bar" style="height:20px"></div><div class="px">20</div><div class="nm">s-5</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="nm">s-6</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="nm">s-8</div></div>
    <div class="step"><div class="bar" style="height:40px"></div><div class="px">40</div><div class="nm">s-10</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="nm">s-12</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="nm">s-16</div></div>
  </div>
</body></html>
