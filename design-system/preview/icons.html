<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--qf-surface);border:1px solid var(--qf-line);border-radius:10px;padding:10px;}
  .ic svg{width:22px;height:22px;color:var(--qf-fg-2);}
  .nm{font-size:10px;color:var(--qf-fg-3);font-family:var(--qf-font-mono);}
</style></head>
<body>
  <div style="font-weight:700;font-size:12px;color:var(--qf-fg-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Lucide · 2px stroke · 24 viewBox · monochrome</div>
