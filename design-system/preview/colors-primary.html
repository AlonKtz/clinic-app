<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{border-radius:var(--qf-r-2);height:78px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff;box-shadow:var(--qf-shadow-1);}
  .sw .n{font-weight:700;font-size:12px;letter-spacing:.02em;}
  .sw .h{font-family:var(--qf-font-mono);font-size:11px;opacity:.85;}
  .sw.lite{color:#7a0716;}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .pulse{width:14px;height:14px;border-radius:50%;background:var(--qf-red-500);animation:qf-pulse-ring 1.8s var(--qf-ease-out) infinite;}
  .lbl{font-weight:700;font-size:13px;color:var(--qf-fg-2);}
  .tag{font-size:11px;color:var(--qf-fg-3);font-family:var(--qf-font-mono);}
</style></head>
<body>
  <div class="head"><div class="pulse"></div><div class="lbl">Pulse Red — primary brand scale</div><div class="tag">--qf-red-50 → 900</div></div>
  <div class="row">
    <div class="sw lite" style="background:var(--qf-red-50)"><div class="n">50</div><div class="h">#FFF1F1</div></div>
    <div class="sw lite" style="background:var(--qf-red-100)"><div class="n">100</div><div class="h">#FFE0E0</div></div>
    <div class="sw lite" style="background:var(--qf-red-200)"><div class="n">200</div><div class="h">#FFC4C4</div></div>
    <div class="sw lite" style="background:var(--qf-red-300)"><div class="n">300</div><div class="h">#FF9090</div></div>
    <div class="sw" style="background:var(--qf-red-400)"><div class="n">400</div><div class="h">#F85959</div></div>
    <div class="sw" style="background:var(--qf-red-500);box-shadow:var(--qf-shadow-glow)"><div class="n">500 · primary</div><div class="h">#E11D2C</div></div>
    <div class="sw" style="background:var(--qf-red-600)"><div class="n">600</div><div class="h">#C00C1F</div></div>
    <div class="sw" style="background:var(--qf-red-700)"><div class="n">700</div><div class="h">#9B0518</div></div>
    <div class="sw" style="background:var(--qf-red-800)"><div class="n">800</div><div class="h">#6F0612</div></div>
    <div class="sw" style="background:var(--qf-red-900)"><div class="n">900</div><div class="h">#420009</div></div>
  </div>
</body></html>
