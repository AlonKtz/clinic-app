<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--qf-surface);border:1px solid var(--qf-line);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--qf-shadow-1);border-right:4px solid var(--qf-red-400);}
  .card.past{border-right-color:#94a3b8;opacity:.75;}
  .num{width:42px;height:42px;border-radius:50%;background:var(--qf-primary-soft);color:var(--qf-primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
  .num.past{background:#f1f5f9;color:#94a3b8;}
  .body{flex:1;min-width:0;}
  .row1{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .name{font-weight:700;font-size:14px;}
  .badge{background:var(--qf-primary-soft);color:var(--qf-primary);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:700;}
  .meta{font-size:12px;color:var(--qf-fg-3);display:flex;gap:14px;}
  svg{width:14px;height:14px;}
</style></head>
<body>
  <div class="stack">
    <div class="card">
      <div class="num">#42</div>
      <div class="body">
        <div class="row1"><span class="name">יום ב׳, 08/05 · 09:00</span><span class="badge">בדיקה שגרתית</span></div>
        <div class="meta"><span>ד״ר יעל כהן</span><span>דנה אברהם</span><span>052-1234567</span></div>
      </div>
    </div>
    <div class="card past">
      <div class="num past">#39</div>
      <div class="body">
        <div class="row1"><span class="name">04/05 · 11:00</span><span class="badge" style="background:#f1f5f9;color:#94a3b8;">עבר</span></div>
        <div class="meta"><span>ד״ר משה לוי</span><span>יוסי מזרחי</span></div>
      </div>
    </div>
  </div>
</body></html>
