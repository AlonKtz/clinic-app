<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .display{font-weight:800;font-size:60px;line-height:1.05;letter-spacing:-0.025em;background:var(--qf-grad-brand-3d);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0;}
  .sub{font-weight:600;font-size:18px;color:var(--qf-fg-3);margin-top:6px;}
  .meta{display:flex;gap:14px;margin-top:14px;font-family:var(--qf-font-mono);font-size:11px;color:var(--qf-fg-3);}
  .meta b{color:var(--qf-fg-1);font-weight:600;}
</style></head>
<body>
  <div class="display">QFlow — מערכת ניהול תורים</div>
  <div class="sub">Heebo 800 · display · -0.025em tracking</div>
  <div class="meta"><span><b>Family</b> Heebo</span><span><b>Size</b> 60 / 1.05</span><span><b>Use</b> hero, marketing only</span></div>
</body></html>
