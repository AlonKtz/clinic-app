<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .head{font-weight:700;font-size:13px;color:var(--qf-fg-2);margin-bottom:10px;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .sw{border-radius:var(--qf-r-2);height:78px;padding:8px 10px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--qf-line);}
  .sw .n{font-weight:700;font-size:12px;}
  .sw .h{font-family:var(--qf-font-mono);font-size:11px;opacity:.7;}
</style></head>
<body>
  <div class="head">Warm Slate — neutrals · biased into red for harmony</div>
  <div class="row">
    <div class="sw" style="background:var(--qf-bg)"><div class="n">bg</div><div class="h">#FBF7F7</div></div>
    <div class="sw" style="background:var(--qf-surface)"><div class="n">surface</div><div class="h">#FFFFFF</div></div>
    <div class="sw" style="background:var(--qf-surface-2)"><div class="n">surface-2</div><div class="h">#FAF3F3</div></div>
    <div class="sw" style="background:var(--qf-line)"><div class="n">line</div><div class="h">#EFE0E0</div></div>
    <div class="sw" style="background:var(--qf-line-2)"><div class="n">line-2</div><div class="h">#E2D2D2</div></div>
    <div class="sw" style="background:var(--qf-fg-4);color:#fff"><div class="n">fg-4</div><div class="h" style="opacity:.85">#B59A9A</div></div>
    <div class="sw" style="background:var(--qf-fg-3);color:#fff"><div class="n">fg-3 · muted</div><div class="h" style="opacity:.85">#8A6F6F</div></div>
    <div class="sw" style="background:var(--qf-fg-2);color:#fff"><div class="n">fg-2</div><div class="h" style="opacity:.8">#4D3838</div></div>
    <div class="sw" style="background:var(--qf-fg-1);color:#fff"><div class="n">fg-1 · text</div><div class="h" style="opacity:.7">#1A1414</div></div>
    <div class="sw" style="background:var(--qf-grad-blush)"><div class="n">blush</div><div class="h">gradient</div></div>
    <div class="sw" style="background:var(--qf-grad-brand);color:#fff;border:none"><div class="n">brand</div><div class="h" style="opacity:.85">linear</div></div>
    <div class="sw" style="background:var(--qf-grad-brand-3d);color:#fff;border:none"><div class="n">brand-3d</div><div class="h" style="opacity:.85">radial</div></div>
  </div>
</body></html>
