<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .b{background:var(--qf-surface);height:84px;border-radius:var(--qf-r-3);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px;border:1px solid var(--qf-line);}
  .nm{font-size:12px;font-weight:700;color:var(--qf-fg-1);}
  .px{font-family:var(--qf-font-mono);font-size:10px;color:var(--qf-fg-3);}
  .pulseDot{width:42px;height:42px;border-radius:50%;background:var(--qf-red-500);box-shadow:var(--qf-shadow-glow);}
</style></head>
<body>
  <div style="font-weight:700;font-size:13px;color:var(--qf-fg-2);margin-bottom:10px;">Shadows — red-tinted, three steps + glow</div>
  <div class="row">
    <div class="b" style="box-shadow:var(--qf-shadow-1)"><div class="nm">shadow-1</div><div class="px">resting</div></div>
    <div class="b" style="box-shadow:var(--qf-shadow-2)"><div class="nm">shadow-2</div><div class="px">hover · open</div></div>
    <div class="b" style="box-shadow:var(--qf-shadow-3)"><div class="nm">shadow-3</div><div class="px">modal · popover</div></div>
    <div class="b" style="border:none;background:transparent;justify-content:center"><div class="pulseDot"></div><div class="nm" style="margin-top:6px">shadow-glow</div><div class="px">CTA · live</div></div>
  </div>
</body></html>
