<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 22px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .row{display:grid;grid-template-columns:60px 1fr 110px;gap:14px;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--qf-line);}
  .row:last-child{border-bottom:none;}
  .px{font-family:var(--qf-font-mono);font-size:11px;color:var(--qf-fg-3);}
  .name{font-family:var(--qf-font-mono);font-size:11px;color:var(--qf-fg-3);text-align:left;}
  .s44{font-size:44px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;}
  .s32{font-size:32px;font-weight:700;letter-spacing:-0.015em;line-height:1.15;}
  .s24{font-size:24px;font-weight:700;line-height:1.2;}
  .s20{font-size:20px;font-weight:700;line-height:1.3;}
  .s17{font-size:17px;font-weight:600;line-height:1.4;}
  .s15{font-size:15px;font-weight:400;color:var(--qf-fg-2);line-height:1.55;}
  .s13{font-size:13px;font-weight:500;color:var(--qf-fg-3);}
  .s12{font-size:12px;font-weight:600;color:var(--qf-fg-3);text-transform:uppercase;letter-spacing:.06em;}
</style></head>
<body>
  <div class="row"><span class="px">44</span><span class="s44">קליניקה</span><span class="name">--qf-fs-3xl</span></div>
  <div class="row"><span class="px">32</span><span class="s32">ניהול תורים</span><span class="name">--qf-fs-2xl · h2</span></div>
  <div class="row"><span class="px">24</span><span class="s24">רשימת רופאים</span><span class="name">--qf-fs-xl</span></div>
  <div class="row"><span class="px">20</span><span class="s20">קביעת תור חדש</span><span class="name">--qf-fs-lg · h3</span></div>
  <div class="row"><span class="px">17</span><span class="s17">סיבת ביקור</span><span class="name">--qf-fs-md</span></div>
  <div class="row"><span class="px">15</span><span class="s15">ד״ר יעל כהן · רישיון 54321</span><span class="name">--qf-fs-base · p</span></div>
  <div class="row"><span class="px">13</span><span class="s13">תאריך ושעה · 2026-05-08 09:00</span><span class="name">--qf-fs-sm</span></div>
  <div class="row"><span class="px">12</span><span class="s12">EYEBROW · LABEL</span><span class="name">--qf-fs-xs</span></div>
</body></html>
