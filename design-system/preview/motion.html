<!DOCTYPE html>
<html dir="rtl" lang="he"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--qf-bg);font-family:var(--qf-font-sans);color:var(--qf-fg-1);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .demo{background:var(--qf-surface);border:1px solid var(--qf-line);border-radius:var(--qf-r-3);height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;overflow:hidden;}
  .nm{font-weight:700;font-size:12px;color:var(--qf-fg-1);}
  .desc{font-size:11px;color:var(--qf-fg-3);font-family:var(--qf-font-mono);}
  .pulseDot{width:34px;height:34px;border-radius:50%;background:var(--qf-red-500);animation:qf-pulse-ring 1.8s var(--qf-ease-out) infinite;}
  .breath{width:34px;height:34px;border-radius:8px;background:var(--qf-grad-brand-3d);animation:qf-pulse-soft 2.4s var(--qf-ease-out) infinite;box-shadow:var(--qf-shadow-2);}
  .float{width:64px;height:34px;border-radius:8px;background:var(--qf-grad-brand-3d);animation:qf-float-3d 4s ease-in-out infinite;box-shadow:var(--qf-shadow-2);}
</style></head>
<body>
  <div style="font-weight:700;font-size:13px;color:var(--qf-fg-2);margin-bottom:10px;">Motion — signature pulse + 3D float (live)</div>
  <div class="grid">
    <div class="demo"><div class="pulseDot"></div><div class="nm">qf-pulse-ring</div><div class="desc">1.8s · halo</div></div>
    <div class="demo"><div class="breath"></div><div class="nm">qf-pulse-soft</div><div class="desc">2.4s · scale 1→1.04</div></div>
    <div class="demo"><div class="float"></div><div class="nm">qf-float-3d</div><div class="desc">4s · rotateX 2°</div></div>
  </div>
</body></html>
